name: Build & Deploy Discovery Server

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'kbase-discovery-server/**'
      - 'pom.xml'
      - '.github/workflows/build-and-deploy-discovery-server.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'kbase-discovery-server/**'
      - 'pom.xml'
      - '.github/workflows/build-and-deploy-discovery-server.yml'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/kbase-discovery-server
  SERVICE_NAME: kbase-discovery-server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          mvn -pl kbase-discovery-server -am clean verify

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./kbase-discovery-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build Docker image (PR only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./kbase-discovery-server/Dockerfile
          push: false

      - name: Deploy to EC2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/kbase

            # 1. Kéo file docker-compose.yml mới nhất
            git pull origin main

            # 2. [THÊM MỚI] Ghi đè file .env mới nhất từ GitHub Secret xuống server
            echo "📝 Cập nhật file .env cho production..."
            cat > .env << 'ENVEOF'
            ${{ secrets.ENV_FILE }}
            ENVEOF

            # 3. Truyền biến DOCKER_USERNAME 
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            # 4. Kéo image MỚI NHẤT của service 
            docker-compose pull discovery-server

            # 5. Ép khởi tạo lại đúng service đó với cấu hình .env mới nhất
            docker-compose up -d --force-recreate discovery-server

            # 6. Dọn dẹp
            docker image prune -f

            sleep 5
            docker ps | grep discovery-server
