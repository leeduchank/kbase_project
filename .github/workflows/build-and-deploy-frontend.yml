name: Build & Deploy Frontend

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'front-end/**'
      - '.github/workflows/build-and-deploy-frontend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'front-end/**'
      - '.github/workflows/build-and-deploy-frontend.yml'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/kbase-frontend
  SERVICE_NAME: frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'front-end/package-lock.json'

      - name: Install dependencies
        working-directory: front-end
        run: npm ci

      - name: Run linter
        working-directory: front-end
        run: npm run lint || true

      - name: Build application
        working-directory: front-end
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-


      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./front-end/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build Docker image (PR only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./front-end/Dockerfile
          push: false

      - name: Deploy to EC2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT }}

          script: |
            cd /home/${{ secrets.EC2_USER }}/kbase

            # Pull latest code
            git pull origin main

            # Pull latest frontend image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main

            # Stop old frontend container
            docker rm -f kbase-frontend || true

            # Start new frontend container
            docker run -d \
              --name kbase-frontend \
              -p 3000:3000 \
              --network host \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main

            # Check service health
            sleep 5
            docker ps | grep kbase-frontend