name: Build & Deploy Frontend

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-frontend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/kbase-frontend
  SERVICE_NAME: frontend

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linter
        working-directory: frontend
        run: npm run lint || true

      - name: Build Next.js
        working-directory: frontend
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Create Dockerfile for frontend
        run: |
          cat > ./frontend/Dockerfile.ci << 'EOF'
          FROM node:18-alpine AS builder
          WORKDIR /app
          COPY frontend/package*.json ./
          RUN npm ci
          COPY frontend .
          RUN npm run build

          FROM node:18-alpine
          WORKDIR /app
          ENV NODE_ENV=production
          COPY frontend/package*.json ./
          RUN npm ci --only=production
          COPY --from=builder /app/.next ./.next
          COPY --from=builder /app/public ./public
          EXPOSE 3000
          CMD ["npm", "start"]
          EOF

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build Docker image (PR only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile.ci
          push: false

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT }}
          
          script: |
            cd /home/${{ secrets.EC2_USER }}/kbase
            
            # Pull latest code
            git pull origin main
            
            # Pull latest frontend image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            
            # Update frontend docker-compose if needed
            # You may need to add frontend service to docker-compose.yml
            
            # Restart frontend service
            docker run -d \
              --name kbase-frontend-new \
              -p 3000:3000 \
              --network host \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            
            # Remove old container
            docker rm -f kbase-frontend || true
            
            # Rename new container
            docker rename kbase-frontend-new kbase-frontend
