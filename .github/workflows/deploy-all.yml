name: Deploy All Services to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy all services to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            
            # Khai báo biến trực tiếp trong script để tránh lỗi mapping của YAML
            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            REGISTRY="docker.io"
            
            cd /home/${{ secrets.EC2_USER }}/kbase
            
            echo "=== Login Docker Hub ==="
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "$DOCKER_USERNAME" --password-stdin
            
            echo "=== Pulling latest code ==="
            git pull origin main
            
            echo "=== Stopping all services ==="
            docker-compose down || true
            
            echo "=== Pulling latest Docker images ==="
            docker pull ${REGISTRY}/${DOCKER_USERNAME}/kbase-discovery-server:main
            docker pull ${REGISTRY}/${DOCKER_USERNAME}/kbase-auth-service:main
            docker pull ${REGISTRY}/${DOCKER_USERNAME}/kbase-api-gateway:main
            docker pull ${REGISTRY}/${DOCKER_USERNAME}/kbase-project-service:main
            docker pull ${REGISTRY}/${DOCKER_USERNAME}/kbase-storage-service:main
            
            echo "=== Starting all services ==="
            docker-compose up -d
            
            echo "=== Waiting for services to start ==="
            sleep 15
            
            echo "=== Checking service status ==="
            docker-compose ps
            
            echo "=== Deployment completed successfully ==="
