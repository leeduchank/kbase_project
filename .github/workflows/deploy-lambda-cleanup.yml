name: Deploy Trash Cleanup Lambda

# Chỉ kích hoạt luồng này khi có code mới được push vào nhánh main VÀ nằm trong thư mục của Lambda
on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/lambda/trash-cleanup/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    # Chạy lệnh build (nén file zip) đã khai báo trong package.json
    - name: Zip Lambda Function
      run: |
        cd infrastructure/lambda/trash-cleanup
        npm run build

    # Xác thực với AWS bằng thông tin lấy từ GitHub Secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

   # Cập nhật code mới, Publish Version và Gắn Alias
    - name: Update Code, Publish Version and Route Alias
      run: |
        # 1. Cập nhật code và ép AWS xuất ra một Version mới (Dùng cờ --publish)
        # Lưu kết quả số version (VD: "5") vào biến $NEW_VERSION
        NEW_VERSION=$(aws lambda update-function-code \
          --function-name kbase-trash-cleanup-job \
          --zip-file fileb://infrastructure/lambda/trash-cleanup/trash-cleanup.zip \
          --publish \
          --query 'Version' \
          --output text)
          
        echo "✅ Đã đóng băng code tại Version: $NEW_VERSION"

        # 2. Cập nhật con trỏ Alias "PROD" chỉ định vào Version vừa tạo
        # (Lưu ý: Bạn phải tạo Alias PROD 1 lần duy nhất bằng tay hoặc Terraform trước khi chạy lệnh này)
        aws lambda update-alias \
          --function-name kbase-trash-cleanup-job \
          --name PROD \
          --function-version $NEW_VERSION
          
        echo "🚀 Đã chuyển hướng traffic của PROD sang Version $NEW_VERSION"