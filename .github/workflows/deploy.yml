# =============================================================================
# KBase - Unified CI/CD Pipeline
# Build ALL services → Push to Docker Hub → Deploy to EC2
# =============================================================================
# Trigger: Push to main branch
# Secrets cần thiết trên GitHub:
#   - DOCKER_USERNAME, DOCKER_PASSWORD
#   - EC2_HOST, EC2_USER, EC2_PRIVATE_KEY, EC2_PORT
#   - ENV_FILE (nội dung file .env cho production trên EC2)
# =============================================================================

name: "🚀 Build & Deploy All Services"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip build, only deploy existing images"
        required: false
        default: "false"
        type: boolean

env:
  REGISTRY: docker.io
  IMAGE_TAG: main

jobs:
  # ===========================================================================
  # JOB 1: Build tất cả 5 Backend Services song song
  # ===========================================================================
  build-backend:
    if: ${{ github.event.inputs.skip_build != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: kbase-discovery-server
            dockerfile: ./kbase-discovery-server/Dockerfile
          - name: kbase-api-gateway
            dockerfile: ./kbase-api-gateway/Dockerfile
          - name: kbase-auth-service
            dockerfile: ./kbase-auth-service/Dockerfile
          - name: kbase-project-service
            dockerfile: ./kbase-project-service/Dockerfile
          - name: kbase-storage-service
            dockerfile: ./kbase-storage-service/Dockerfile

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build & Push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.name }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # JOB 2: Build Frontend
  # ===========================================================================
  build-frontend:
    if: ${{ github.event.inputs.skip_build != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./front-end/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/kbase-frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/kbase-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # JOB 3: Deploy lên EC2
  # ===========================================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    # Luôn chạy deploy nếu skip_build = true (chỉ deploy lại image cũ)
    if: always() && (needs.build-backend.result == 'success' && needs.build-frontend.result == 'success' || github.event.inputs.skip_build == 'true')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            echo "========================================="
            echo "🚀 KBase Deployment - $(date)"
            echo "========================================="

            # --- Config ---
            DEPLOY_DIR="/home/${{ secrets.EC2_USER }}/kbase"
            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            REGISTRY="docker.io"
            TAG="main"

            # Tạo thư mục deploy nếu chưa có
            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR

            # --- Login Docker Hub ---
            echo "🔐 Logging in to Docker Hub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "$DOCKER_USERNAME" --password-stdin

            # --- Pull tất cả images mới ---
            echo "📦 Pulling latest images..."
            docker pull ${REGISTRY}/${DOCKER_USERNAME}/kbase-discovery-server:${TAG}
            docker pull ${REGISTRY}/${DOCKER_USERNAME}/kbase-api-gateway:${TAG}
            docker pull ${REGISTRY}/${DOCKER_USERNAME}/kbase-auth-service:${TAG}
            docker pull ${REGISTRY}/${DOCKER_USERNAME}/kbase-project-service:${TAG}
            docker pull ${REGISTRY}/${DOCKER_USERNAME}/kbase-storage-service:${TAG}
            docker pull ${REGISTRY}/${DOCKER_USERNAME}/kbase-frontend:${TAG}

            # --- Cập nhật docker-compose.yml từ repo ---
            echo "📄 Updating docker-compose.yml..."
            if [ -d ".git" ]; then
              git pull origin main --ff-only || true
            fi

            # --- Ghi file .env cho production ---
            echo "📝 Writing production .env file..."
            cat > .env << 'ENVEOF'
            ${{ secrets.ENV_FILE }}
            ENVEOF

            # --- Restart services ---
            echo "♻️ Restarting services..."
            docker compose down --remove-orphans || true
            docker compose up -d

            # --- Chờ services khởi động ---
            echo "⏳ Waiting for services to start..."
            sleep 30

            # --- Kiểm tra trạng thái ---
            echo "📊 Service status:"
            docker compose ps

            # --- Dọn dẹp images cũ ---
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "========================================="
            echo "✅ Deployment completed successfully!"
            echo "========================================="
