name: Run Tests - All Services

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run all tests
        run: mvn clean verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/target/surefire-reports/
            **/target/site/jacoco/

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/target/surefire-reports/TEST-*.xml'

      - name: Prepare coverage website
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          mkdir -p coverage

          for module in kbase-api-gateway kbase-auth-service kbase-project-service kbase-storage-service; do
            if [ -d "$module/target/site/jacoco" ]; then
              mkdir -p "coverage/$module"
              cp -R "$module/target/site/jacoco/." "coverage/$module/"
            fi
          done

          cat > coverage/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>KBase Coverage Report</title>
            <style>
              :root {
                color-scheme: light;
                font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                color: #172026;
                background: #f6f8fa;
              }
              body {
                margin: 0;
                padding: 48px 20px;
              }
              main {
                max-width: 960px;
                margin: 0 auto;
              }
              h1 {
                margin: 0 0 8px;
                font-size: 32px;
                letter-spacing: 0;
              }
              p {
                margin: 0 0 28px;
                color: #536471;
              }
              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 16px;
              }
              a {
                display: block;
                padding: 18px;
                border: 1px solid #d8dee4;
                border-radius: 8px;
                background: #ffffff;
                color: #0969da;
                text-decoration: none;
                font-weight: 700;
              }
              a span {
                display: block;
                margin-top: 8px;
                color: #6e7781;
                font-size: 14px;
                font-weight: 500;
              }
              a:hover {
                border-color: #0969da;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>KBase Coverage Report</h1>
              <p>JaCoCo HTML reports generated by the latest successful CI run on main.</p>
              <div class="grid">
                <a href="./kbase-api-gateway/index.html">API Gateway<span>JWT and gateway utilities</span></a>
                <a href="./kbase-auth-service/index.html">Auth Service<span>Authentication and user account logic</span></a>
                <a href="./kbase-project-service/index.html">Project Service<span>Projects, notifications, and activity logic</span></a>
                <a href="./kbase-storage-service/index.html">Storage Service<span>Documents, trash cleanup, and storage logic</span></a>
              </div>
            </main>
          </body>
          </html>
          HTML

      - name: Upload coverage website
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage

  deploy-coverage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy coverage website
        id: deployment
        uses: actions/deploy-pages@v4
