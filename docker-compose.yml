# =============================================================================
# KBase Microservices - Docker Compose (Production)
# =============================================================================
# Sử dụng: docker-compose up -d
# Lưu ý:   Tạo file .env tại root với các biến cần thiết (xem .env.example)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Infrastructure: PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: kbase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: kbase_auth,kbase_project,kbase_storage
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "5432:5432"
    networks:
      - kbase-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Service Discovery: Eureka Server
  # ---------------------------------------------------------------------------
  discovery-server:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/kbase-discovery-server:${IMAGE_TAG:-main}
    container_name: kbase-discovery-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - kbase-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # API Gateway
  # ---------------------------------------------------------------------------
  api-gateway:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/kbase-api-gateway:${IMAGE_TAG:-main}
    container_name: kbase-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - kbase-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Auth Service
  # ---------------------------------------------------------------------------
  auth-service:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/kbase-auth-service:${IMAGE_TAG:-main}
    container_name: kbase-auth-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST:-postgres}:5432/kbase_auth
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SQS_USER_EVENTS_QUEUE_URL: ${AWS_SQS_USER_EVENTS_QUEUE_URL}
      AWS_SQS_ACTIVTY_EVENTS_QUEUE_URL: ${AWS_SQS_ACTIVTY_EVENTS_QUEUE_URL}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - kbase-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Project Service
  # ---------------------------------------------------------------------------
  project-service:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/kbase-project-service:${IMAGE_TAG:-main}
    container_name: kbase-project-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST:-postgres}:5432/kbase_project
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SQS_USER_EVENTS_QUEUE_URL: ${AWS_SQS_USER_EVENTS_QUEUE_URL}
      AWS_SQS_ACTIVTY_EVENTS_QUEUE_URL: ${AWS_SQS_ACTIVTY_EVENTS_QUEUE_URL}
      AUTH_SERVICE_URL: kbase-auth-service
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - kbase-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Storage Service
  # ---------------------------------------------------------------------------
  storage-service:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/kbase-storage-service:${IMAGE_TAG:-main}
    container_name: kbase-storage-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST:-postgres}:5432/kbase_storage
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      AWS_SQS_ACTIVTY_EVENTS_QUEUE_URL: ${AWS_SQS_ACTIVTY_EVENTS_QUEUE_URL}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - kbase-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Frontend (React/Vite + serve)
  # ---------------------------------------------------------------------------
  frontend:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/kbase-frontend:${IMAGE_TAG:-main}
    container_name: kbase-frontend
    environment:
      # SSR server dùng URL nội bộ Docker để gọi API từ server-side
      - VITE_API_URL=http://api-gateway:8080
    restart: unless-stopped
    ports:
      - "80:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - kbase-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  kbase-network:
    driver: bridge
