spring:
  main:
    web-application-type: reactive
  application:
    name: kbase-api-gateway
  cloud:
    gateway:

      default-filters:
        - name: DedupeResponseHeader
          args:
            name: Access-Control-Allow-Origin Access-Control-Allow-Credentials
            strategy: RETAIN_FIRST

      routes:
        # Auth Service: /api/auth/** -> kbase-auth-service /auth/**
        - id: kbase-auth-service
          uri: lb://kbase-auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        # Project Service: /api/projects/** -> kbase-project-service /projects/**
        - id: kbase-project-service
          uri: lb://kbase-project-service
          predicates:
            - Path=/api/projects/**
          filters:
            - StripPrefix=1

        # Admin Project Service: /api/admin/projects/** -> kbase-project-service /admin/projects/**
        - id: kbase-admin-project-service
          uri: lb://kbase-project-service
          predicates:
            - Path=/api/admin/projects/**
          filters:
            - StripPrefix=1

        # Storage Service: /api/storage/** -> kbase-storage-service /storage/**
        - id: kbase-storage-service
          uri: lb://kbase-storage-service
          predicates:
            - Path=/api/storage/**
          filters:
            - StripPrefix=1

        # OpenAPI docs from each service, exposed through this gateway only.
        - id: kbase-auth-openapi
          uri: lb://kbase-auth-service
          predicates:
            - Path=/api-docs/auth
          filters:
            - RewritePath=/api-docs/auth, /v3/api-docs

        - id: kbase-project-openapi
          uri: lb://kbase-project-service
          predicates:
            - Path=/api-docs/projects
          filters:
            - RewritePath=/api-docs/projects, /v3/api-docs

        - id: kbase-storage-openapi
          uri: lb://kbase-storage-service
          predicates:
            - Path=/api-docs/storage
          filters:
            - RewritePath=/api-docs/storage, /v3/api-docs

        # Notification SSE Stream: /api/notifications/stream -> kbase-project-service /notifications/stream
        - id: kbase-notification-stream
          uri: lb://kbase-project-service
          predicates:
            - Path=/api/notifications/stream
          filters:
            - StripPrefix=1
          metadata:
            response-timeout: 1800000
            connect-timeout: 5000

        # Notification Service: /api/notifications/** -> kbase-project-service /notifications/**
        - id: kbase-notification-service
          uri: lb://kbase-project-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1


      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://3.104.37.34,http://15.135.146.88}
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600


server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenSigningAndValidationPurpose12345}

spring.data.redis:
  host: ${SPRING_DATA_REDIS_HOST:localhost}
  port: ${SPRING_DATA_REDIS_PORT:6379}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /api-docs/auth
      - name: Project Service
        url: /api-docs/projects
      - name: Storage Service
        url: /api-docs/storage
    urls-primary-name: Auth Service
  api-docs:
    enabled: true
