spring:
  main:
    web-application-type: reactive
  application:
    name: kbase-api-gateway
  cloud:
    gateway:
      default-filters:
        - JwtAuthenticationFilter

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
