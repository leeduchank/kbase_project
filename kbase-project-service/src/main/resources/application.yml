spring:
  application:
    name: kbase-project-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://kbase-db.cj2qumcg4gcs.ap-southeast-2.rds.amazonaws.com:5432/kbase_project}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    baselineOnMigrate: true
    locations: classpath:db/migration

server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

aws:
  region: ${AWS_REGION}
  access-key: ${AWS_ACCESS_KEY_ID}
  secret-key: ${AWS_SECRET_ACCESS_KEY}
  sqs:
    user-events-queue-url: ${AWS_SQS_USER_EVENTS_QUEUE_URL}

